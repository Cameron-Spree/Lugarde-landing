/* ---------- RESET & BASE ---------- */
.lugarde-premier-page {

  --lp-secondary-container: #d4e4d0;
  --lp-on-secondary-container: #586757;
  --lp-secondary-fixed: #d7e7d3;
  --lp-secondary-fixed-dim: #bbcbb8;

  --lp-tertiary-fixed-dim: #7ad992;
  --lp-on-tertiary-fixed: #003d1a;
  --lp-on-tertiary-fixed-variant: #009640;

  --lp-surface: #fcfcfc;
  --lp-surface-dim: #dadadc;
  --lp-surface-bright: #fcfcfc;
  --lp-surface-container-lowest: #ffffff;
  --lp-surface-container-low: #f3f3f6;
  --lp-surface-container: #eeeef0;
  --lp-surface-container-high: #e8e8ea;
